<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pilot Intelligent Veterinar v1.3.0</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Firebase SDKs (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <!-- Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <style>
        :root { --glass: rgba(255, 255, 255, 0.85); }
        body {
            font-family: 'Poppins', sans-serif;
            background: #f0f4f8 url('https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg') no-repeat center fixed;
            background-size: 40%;
            min-height: 100vh;
        }
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            border-radius: 1.5rem;
        }
        .header-font { font-family: 'Orbitron', sans-serif; }
        .btn-3d {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0 #0369a1;
        }
        .btn-3d:active {
            transform: translateY(3px);
            box-shadow: none;
        }
        .status-sync { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 lg:p-8">

    <div class="max-w-7xl mx-auto">
        
        <!-- HEADER -->
        <header class="glass-card p-6 mb-8 flex flex-col md:flex-row items-center justify-between gap-6">
            <div class="flex items-center gap-4">
                <img src="https://upload.wikimedia.org/wikipedia/commons/2/26/Coat_of_arms_of_Malaysia.svg" class="w-16 h-16 drop-shadow-md">
                <div class="w-14 h-14 rounded-full bg-blue-600 flex items-center justify-center border-4 border-white shadow-lg">
                    <i data-lucide="shield-check" class="text-white w-7 h-7"></i>
                </div>
            </div>

            <div class="text-center">
                <h1 class="header-font text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-900 to-blue-500">
                    PILOT INTELLIGENT VETERINAR
                </h1>
                <p class="text-[10px] tracking-[4px] font-bold text-blue-400">SISTEM PENGURUSAN LOG KORPORAT</p>
                <span class="text-[10px] bg-blue-100 text-blue-700 px-3 py-1 rounded-full mt-2 inline-block font-mono">v1.3.0 - STABLE VERSION</span>
            </div>

            <div id="login-container">
                <button id="btn-login" onclick="loginGoogle()" class="flex items-center gap-3 bg-white border border-gray-200 px-6 py-2.5 rounded-full shadow-sm hover:bg-gray-50 transition-all font-semibold btn-3d" style="box-shadow: 0 4px 0 #e2e8f0;">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-5 h-5">
                    Log Masuk Google
                </button>
            </div>

            <div id="user-display" class="hidden flex items-center gap-4">
                <div class="text-right">
                    <p id="user-name" class="font-bold text-sm text-gray-800"></p>
                    <button onclick="logout()" class="text-xs text-red-500 font-bold hover:underline">LOG KELUAR</button>
                </div>
                <img id="user-photo" src="" class="w-12 h-12 rounded-full border-2 border-blue-500 shadow-xl">
            </div>
        </header>

        <!-- INFO SECTION -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 glass-card p-6">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase">Bulan/Tahun</label>
                <input type="month" id="meta-month" class="w-full bg-white border border-gray-100 rounded-lg p-2 focus:ring-2 ring-blue-400 outline-none" onchange="syncToFirebase()">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase">Kenderaan</label>
                <input type="text" id="meta-type" placeholder="Model" class="w-full bg-white border border-gray-100 rounded-lg p-2 focus:ring-2 ring-blue-400 outline-none" onchange="syncToFirebase()">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase">No. Pendaftaran</label>
                <input type="text" id="meta-plate" placeholder="No Plat" class="w-full bg-white border border-gray-100 rounded-lg p-2 focus:ring-2 ring-blue-400 outline-none" onchange="syncToFirebase()">
            </div>
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-gray-400 uppercase">Bahagian/Unit</label>
                <input type="text" id="meta-unit" placeholder="Unit" class="w-full bg-white border border-gray-100 rounded-lg p-2 focus:ring-2 ring-blue-400 outline-none" onchange="syncToFirebase()">
            </div>
        </div>

        <!-- TABLE -->
        <div class="glass-card overflow-hidden mb-6">
            <div class="overflow-x-auto">
                <table class="w-full text-sm">
                    <thead class="bg-blue-900 text-white">
                        <tr>
                            <th class="p-4 text-left">Tarikh</th>
                            <th class="p-4 text-left">Masa</th>
                            <th class="p-4 text-left">Pemandu</th>
                            <th class="p-4 text-left">Tujuan</th>
                            <th class="p-4 text-left">Odo</th>
                            <th class="p-4 text-left">Jarak</th>
                            <th class="p-4 text-left">RM</th>
                            <th class="p-4 text-left">Liter</th>
                            <th class="p-4 text-center">X</th>
                        </tr>
                    </thead>
                    <tbody id="main-table-body"></tbody>
                </table>
            </div>
            <div class="p-4 bg-white/50 border-t border-gray-100 flex justify-between items-center">
                <button onclick="addRow()" class="bg-blue-600 text-white px-5 py-2 rounded-xl font-bold btn-3d flex items-center gap-2">
                    <i data-lucide="plus" class="w-4 h-4"></i> Tambah Data
                </button>
                <div id="sync-status" class="text-[10px] font-bold text-gray-400 uppercase flex items-center gap-2">
                    <i data-lucide="database" class="w-4 h-4"></i> Standby
                </div>
            </div>
        </div>

        <!-- FOOTER TOOLS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-6 border-l-8 border-blue-600">
                <h3 class="font-bold text-blue-800 text-sm mb-4 flex items-center gap-2">
                    <i data-lucide="calculator" class="w-5 h-5"></i> KADAR BAHAN API
                </h3>
                <div class="space-y-2">
                    <div class="flex justify-between"><span class="text-xs text-gray-500">Jumlah Jarak:</span> <span id="stat-dist" class="font-bold">0 KM</span></div>
                    <div class="flex justify-between"><span class="text-xs text-gray-500">Jumlah Liter:</span> <span id="stat-liter" class="font-bold">0 L</span></div>
                    <div class="pt-2 border-t flex justify-between items-center">
                        <span class="text-xs font-bold text-blue-600">KM/LITER:</span>
                        <span id="stat-rate" class="text-2xl font-black text-blue-700 italic">0.00</span>
                    </div>
                </div>
            </div>

            <div class="glass-card p-6 border-l-8 border-purple-600">
                <h3 class="font-bold text-purple-800 text-sm mb-4 flex items-center gap-2">
                    <i data-lucide="banknote" class="w-5 h-5"></i> GAJI SEJAM
                </h3>
                <input type="number" id="gaji-pokok" placeholder="Gaji Pokok (RM)" class="w-full p-2 mb-2 rounded border border-purple-100 outline-none text-sm" oninput="calcSalary(); syncToFirebase()">
                <div class="bg-purple-900 text-white p-3 rounded-lg text-center">
                    <p id="stat-gaji" class="text-xl font-bold">RM 0.00</p>
                </div>
            </div>

            <div class="glass-card p-6 bg-gray-900 text-white">
                <h3 class="font-bold text-sm mb-4 flex items-center gap-2"><i data-lucide="share" class="w-5 h-5"></i> EXPORT</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="exportToExcel()" class="bg-green-600 py-2 rounded text-[10px] font-bold hover:bg-green-500">EXCEL</button>
                    <button onclick="exportData('word')" class="bg-blue-600 py-2 rounded text-[10px] font-bold hover:bg-blue-500">WORD</button>
                    <button onclick="window.print()" class="bg-red-600 py-2 rounded text-[10px] font-bold col-span-2 hover:bg-red-500">PRINT / PDF</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // === FIREBASE CONFIG ===
        const firebaseConfig = {
            apiKey: "AIzaSyDdCwKNCx0nA1cZirGrw1UYvtumALluVXw",
            authDomain: "pilot-veterinar.firebaseapp.com",
            projectId: "pilot-veterinar",
            storageBucket: "pilot-veterinar.firebasestorage.app",
            messagingSenderId: "559136368070",
            appId: "1:559136368070:web:8aaa2dcb804c73f10cbec7"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const provider = new firebase.auth.GoogleAuthProvider();

        let currentUser = null;

        // === AUTH FUNCTIONS ===
        async function loginGoogle() {
            try {
                // Gunakan popup untuk login
                const result = await auth.signInWithPopup(provider);
                currentUser = result.user;
                console.log("Login berjaya:", currentUser.displayName);
                handleAuthChange(currentUser);
            } catch (error) {
                console.error("Login Error:", error);
                alert("Gagal Log Masuk: " + error.message + "\n\nPastikan Google Auth diaktifkan di Firebase Console.");
            }
        }

        function logout() {
            auth.signOut().then(() => {
                window.location.reload();
            });
        }

        function handleAuthChange(user) {
            if (user) {
                currentUser = user;
                document.getElementById('login-container').classList.add('hidden');
                document.getElementById('user-display').classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-photo').src = user.photoURL;
                loadData();
            }
        }

        // Pantau status login secara automatik
        auth.onAuthStateChanged(handleAuthChange);

        // === CORE LOGIC ===
        function addRow(data = {}) {
            const tbody = document.getElementById('main-table-body');
            const tr = document.createElement('tr');
            tr.className = "hover:bg-blue-50/50 border-b border-gray-100 transition-colors bg-white/40";
            
            tr.innerHTML = `
                <td class="p-2"><input type="date" value="${data.tarikh || ''}" class="w-full bg-transparent outline-none row-input"></td>
                <td class="p-2 flex gap-1">
                    <input type="time" value="${data.mula || ''}" class="w-1/2 bg-transparent text-[10px] outline-none row-input">
                    <input type="time" value="${data.hingga || ''}" class="w-1/2 bg-transparent text-[10px] outline-none row-input">
                </td>
                <td class="p-2"><input type="text" value="${data.pemandu || ''}" class="w-full bg-transparent outline-none row-input" placeholder="Nama"></td>
                <td class="p-2"><input type="text" value="${data.tujuan || ''}" class="w-full bg-transparent outline-none row-input text-xs" placeholder="Dari-Ke"></td>
                <td class="p-2"><input type="number" value="${data.odo || ''}" class="w-16 bg-transparent outline-none row-input odo-val text-xs"></td>
                <td class="p-2"><input type="number" value="${data.jarak || ''}" class="w-12 bg-transparent outline-none row-input dist-val font-bold"></td>
                <td class="p-2"><input type="number" value="${data.rm || ''}" class="w-12 bg-transparent outline-none row-input rm-val"></td>
                <td class="p-2"><input type="number" value="${data.liter || ''}" class="w-12 bg-transparent outline-none row-input liter-val"></td>
                <td class="p-2 text-center">
                    <button onclick="this.parentElement.parentElement.remove(); syncToFirebase()" class="text-red-400 hover:text-red-600"><i data-lucide="x-circle" class="w-4 h-4"></i></button>
                </td>
            `;
            tbody.appendChild(tr);
            lucide.createIcons();
            attachListeners();
        }

        function attachListeners() {
            document.querySelectorAll('.row-input').forEach(input => {
                input.oninput = () => { calculateAll(); syncToFirebase(); };
            });
        }

        function calculateAll() {
            let d = 0, l = 0;
            document.querySelectorAll('.dist-val').forEach(i => d += Number(i.value));
            document.querySelectorAll('.liter-val').forEach(i => l += Number(i.value));
            document.getElementById('stat-dist').innerText = d + " KM";
            document.getElementById('stat-liter').innerText = l + " L";
            document.getElementById('stat-rate').innerText = l > 0 ? (d/l).toFixed(2) : "0.00";
            calcSalary();
        }

        function calcSalary() {
            const gaji = document.getElementById('gaji-pokok').value;
            if (gaji) {
                document.getElementById('stat-gaji').innerText = "RM " + ((gaji * 12) / 2504).toFixed(2);
            }
        }

        // === SYNC DATA ===
        let timer;
        async function syncToFirebase() {
            if (!currentUser) return;
            const status = document.getElementById('sync-status');
            status.innerHTML = `<i data-lucide="refresh-cw" class="w-4 h-4 animate-spin text-blue-500"></i> Menyimpan...`;
            status.classList.add('status-sync');
            lucide.createIcons();

            clearTimeout(timer);
            timer = setTimeout(async () => {
                const logs = [];
                document.querySelectorAll('#main-table-body tr').forEach(row => {
                    const i = row.querySelectorAll('input');
                    logs.push({
                        tarikh: i[0].value, mula: i[1].value, hingga: i[2].value,
                        pemandu: i[3].value, tujuan: i[4].value, odo: i[5].value,
                        jarak: i[6].value, rm: i[7].value, liter: i[8].value
                    });
                });

                const data = {
                    meta: {
                        month: document.getElementById('meta-month').value,
                        type: document.getElementById('meta-type').value,
                        plate: document.getElementById('meta-plate').value,
                        unit: document.getElementById('meta-unit').value,
                        gaji: document.getElementById('gaji-pokok').value
                    },
                    logs: logs
                };

                try {
                    await db.collection("logs").doc(currentUser.uid).set(data);
                    status.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4 text-green-500"></i> Cloud Secured`;
                    status.classList.remove('status-sync');
                    lucide.createIcons();
                } catch (e) {
                    status.innerHTML = `<i data-lucide="alert-triangle" class="w-4 h-4 text-red-500"></i> Error`;
                }
            }, 1500);
        }

        async function loadData() {
            const doc = await db.collection("logs").doc(currentUser.uid).get();
            if (doc.exists) {
                const d = doc.data();
                document.getElementById('meta-month').value = d.meta.month;
                document.getElementById('meta-type').value = d.meta.type;
                document.getElementById('meta-plate').value = d.meta.plate;
                document.getElementById('meta-unit').value = d.meta.unit;
                document.getElementById('gaji-pokok').value = d.meta.gaji;
                document.getElementById('main-table-body').innerHTML = "";
                d.logs.forEach(l => addRow(l));
                calculateAll();
            } else { addRow(); }
        }

        // === EXPORT ===
        function exportToExcel() {
            const ws = XLSX.utils.table_to_sheet(document.querySelector("table"));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Log");
            XLSX.writeFile(wb, "Log_Veterinar.xlsx");
        }

        function exportData(fmt) {
            const blob = new Blob([document.body.innerText], {type: "text/plain"});
            saveAs(blob, "Log_Veterinar." + (fmt === 'word' ? 'doc' : 'txt'));
        }

        window.onload = () => { lucide.createIcons(); };
    </script>
</body>
</html>
